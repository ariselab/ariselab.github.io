name: "ARiSE Lab"
full_name: "AI for Reliable and Intelligent Software Engineering"
university: "Columbia University"
department: "Department of Computer Science"
description: "Led by Prof. Baishakhi Ray at Columbia University, our group conducts research at the intersection of AI and Software Engineering, with a particular focus on AI for Code. We explore how neurosymbolic techniques, blending the power of machine learning with the rigor of formal reasoning, can transform software reliability, security, and developer productivity. Through building new language models, agents, and new abstractions, we aim to make code not just easier to write, but easier to trust. Prof. Ray also serves as an Amazon Scholar, collaborating with the Amazon Agentic AI team."
tagline: "Making your Code Smarter, Safer, and More Collaborative — with AI"
logo: "/images/site-logo.png"
location: "CEPSR, Columbia University, New York, NY"

