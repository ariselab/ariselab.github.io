<section class="hero">
  <div class="hero__mesh"></div>
  <div class="hero__noise"></div>
  <div class="hero__content">
    <div class="hero__eyebrow">{{ site.data.lab.university }} · {{ site.data.lab.department }}</div>
    <h1 class="hero__title">{{ site.data.lab.name }}</h1>
    <p class="hero__subtitle">{{ site.data.lab.full_name }}</p>
    <p class="hero__desc">{{ site.data.lab.description }}</p>
    <div class="hero__actions">
      <a href="#publications" class="btn btn--primary">View Research</a>
      <a href="#members" class="btn btn--glass">Meet the Team</a>
    </div>
  </div>
  <div class="hero__scroll-hint">
    <span>Scroll</span>
    <div class="hero__scroll-line"></div>
  </div>
</section>
