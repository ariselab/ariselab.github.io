<section class="hero">
  <div class="hero-bg"></div>
  <div class="container hero-content">
    <p class="hero-eyebrow">{{ site.data.lab.university }} &middot; {{ site.data.lab.department }}</p>
    <h1 style="display: flex; align-items: center; gap: 16px;" class="hero-title"><img src="{{ '/images/logo_transparent_cropped.png' | relative_url }}" alt="" style="height: 1.6em; width: auto; filter: invert(1);">{{ site.data.lab.name }}</h1>
    <p style="font-family: 'Lora', Georgia, serif; font-size: clamp(1.15rem, 2.5vw, 1.5rem); font-weight: 400; font-style: italic; color: #6b6560; margin-bottom: 28px; letter-spacing: 0.01em;">{{ site.data.lab.full_name }}</p>
    <p class="hero-description">{{ site.data.lab.description }}</p>
    {% if site.data.lab.tagline %}
    <p class="hero-tagline">{{ site.data.lab.tagline }}</p>
    {% endif %}
  </div>
</section>
